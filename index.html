<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Light Timer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.5s;
}

#state {
    font-size: 12vw;
    font-weight: bold;
    color: white;
}

#timer {
    font-size: 20vw;
    font-weight: bold;
    color: white;
}

#controls {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
}
</style>
</head>

<body>

<div id="controls">
    Min:
    <input id="min" type="number" value="15">
    Max:
    <input id="max" type="number" value="90">
    <button onclick="start()">Start</button>
</div>

<div id="state">READY</div>
<div id="timer">0</div>

<script>
let running = false;

/* =========================
   AUDIO ENGINE (IMPORTANT FIX)
========================= */
const greenAudio = new Audio("https://jacemartin9999.github.io/Random-light-timer/green-light.m4a");
const redAudio = new Audio("https://jacemartin9999.github.io/Random-light-timer/red-light.m4a");

greenAudio.preload = "auto";
redAudio.preload = "auto";

/* 🔥 IMPORTANT: keep ONLY ONE instance alive */
function play(audio) {
    try {
        audio.pause();
        audio.currentTime = 0;
        audio.play();
    } catch (e) {
        console.log(e);
    }
}

/* =========================
   RANDOM TIMER
========================= */
function randomBetween(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* =========================
   LOOP
========================= */
async function cycle() {
    while (running) {
        await phase("GREEN LIGHT", "green", greenAudio);
        await phase("RED LIGHT", "red", redAudio);
    }
}

/* =========================
   PHASE
========================= */
function phase(text, color, audio) {
    return new Promise(resolve => {

        document.body.style.backgroundColor = color;
        document.getElementById("state").innerText = text;

        play(audio);

        let min = parseInt(document.getElementById("min").value);
        let max = parseInt(document.getElementById("max").value);

        let duration = randomBetween(min, max);
        let remaining = duration;

        document.getElementById("timer").innerText = remaining;

        const interval = setInterval(() => {

            remaining--;
            document.getElementById("timer").innerText = remaining;

            if (remaining <= 0) {
                clearInterval(interval);
                resolve();
            }

        }, 1000);
    });
}

/* =========================
   START (CRITICAL UNLOCK FIX)
========================= */
    function start() {

    document.getElementById("state").innerText = "START CLICKED";

    if (running) return;

    greenAudio.play();
    redAudio.play();

    greenAudio.pause();
    redAudio.pause();

    greenAudio.currentTime = 0;
    redAudio.currentTime = 0;

    running = true;
    cycle();
}
    
}
</script>

</body>
</html>
