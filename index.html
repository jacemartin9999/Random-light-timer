<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Light Timer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.5s;
}

#container {
    text-align: center;
    color: white;
}

#state {
    font-size: 12vw;
    font-weight: bold;
}

#timer {
    font-size: 20vw;
    font-weight: bold;
}

#controls {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 18px;
}

input {
    width: 70px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="controls">
    Min:
    <input id="min" type="number" value="15">
    Max:
    <input id="max" type="number" value="90">
    <button onclick="start()">Start</button>
</div>

<div id="container">
    <div id="state">READY</div>
    <div id="timer">0</div>
</div>

<script>
let running = false;

/* =========================
   AUDIO FILES
========================= */
const greenLightSound = new Audio(
    "https://jacemartin9999.github.io/Random-light-timer/green-light.m4a"
);

const redLightSound = new Audio(
    "https://jacemartin9999.github.io/Random-light-timer/red-light.m4a"
);

/* =========================
   SPEECH (FIXED - NO QUEUE BUG)
========================= */
function speak(text) {

    // 🔥 kill any existing speech instantly
    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);

    const voices = speechSynthesis.getVoices();

    const selectedVoice =
        voices.find(v => v.name.includes("Samantha")) ||
        voices.find(v => v.lang === "en-US") ||
        voices[0];

    if (selectedVoice) {
        utterance.voice = selectedVoice;
    }

    speechSynthesis.speak(utterance);
}

/* =========================
   RANDOM NUMBER
========================= */
function randomBetween(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* =========================
   MAIN LOOP
========================= */
async function cycle() {
    while (running) {
        await phase("GREEN LIGHT", "green");
        await phase("RED LIGHT", "red");
    }
}

/* =========================
   PHASE SYSTEM
========================= */
function phase(text, color) {
    return new Promise(resolve => {

        // 🔥 extra safety: prevent speech stacking
        speechSynthesis.cancel();

        document.body.style.backgroundColor = color;
        document.getElementById("state").innerText = text;

        speak(text);

        /* =========================
           AUDIO TRIGGERS
        ========================= */
        if (text === "GREEN LIGHT") {
            greenLightSound.currentTime = 0;
            greenLightSound.play();
        }

        if (text === "RED LIGHT") {
            redLightSound.currentTime = 0;
            redLightSound.play();
        }

        let min = parseInt(document.getElementById("min").value);
        let max = parseInt(document.getElementById("max").value);

        let duration = randomBetween(min, max);
        let remaining = duration;

        document.getElementById("timer").innerText = remaining;

        const interval = setInterval(() => {

            remaining--;
            document.getElementById("timer").innerText = remaining;

            if (remaining <= 0) {
                clearInterval(interval);
                resolve();
            }

        }, 1000);
    });
}

/* =========================
   START (iPHONE AUDIO FIX)
========================= */
function start() {

    if (running) return;

    // 🔓 unlock audio on mobile
    greenLightSound.play().then(() => {
        greenLightSound.pause();
        greenLightSound.currentTime = 0;
    }).catch(() => {});

    redLightSound.play().then(() => {
        redLightSound.pause();
        redLightSound.currentTime = 0;
    }).catch(() => {});

    running = true;
    cycle();
}
</script>

</body>
</html>
